version: '3.8'

services:
  openclaw:
    # SECURITY: Pin to specific version instead of 'latest' to prevent supply chain attacks
    # Get the latest stable version from: https://hub.docker.com/r/openclaw/openclaw/tags
    # Format: image:repo@sha256:abc123... (preferred) or image:repo:v1.2.3
    image: openclaw/openclaw:v0.1.0  # TODO: Replace with actual version and pin to SHA256
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"  # Loopback only - no public access
    environment:
      # Gateway token - required for Web UI access
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
      
      # Model provider: 'openrouter' or 'bedrock'
      - MODEL_PROVIDER=${MODEL_PROVIDER:-openrouter}
      
      # OpenRouter configuration (when MODEL_PROVIDER=openrouter)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-openai/gpt-4o-mini}
      
      # Bedrock configuration (when MODEL_PROVIDER=bedrock)
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-amazon.nova-lite-v1:0}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      
      # Optional: Channel configuration
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
    
    volumes:
      # Persistent data storage
      - /opt/openclaw/data:/app/data
      - /opt/openclaw/config:/app/config
    
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "${AWS_REGION:-us-west-2}"
        awslogs-group: "/openclaw/dev/openclaw"
        awslogs-stream-prefix: "openclaw"
    
    # Resource limits (optional but recommended)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

# Network configuration (optional - uses default bridge if not specified)
# networks:
#   openclaw-network:
#     driver: bridge
